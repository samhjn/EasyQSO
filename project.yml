name: EasyQSO
options:
  bundleIdPrefix: com.shadowmov
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 938YYDD5ZL

targets:
  EasyQSO:
    type: application
    platform: iOS
    sources:
      - path: EasyQSO
        excludes:
          - "Preview Content"
    resources:
      - path: EasyQSO/Preview Content
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shadowmov.EasyQSO
        INFOPLIST_FILE: EasyQSO/Info.plist
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        DEVELOPMENT_ASSET_PATHS: "\"EasyQSO/Preview Content\""
    scheme:
      testTargets: []
      gatherCoverageData: false

schemes:
  EasyQSO:
    build:
      targets:
        EasyQSO: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
