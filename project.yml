name: EasyQSO
options:
  bundleIdPrefix: com.shadowmov
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  developmentLanguage: en
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 938YYDD5ZL

targets:
  EasyQSO:
    type: application
    platform: iOS
    sources:
      - path: EasyQSO
        excludes:
          - "Preview Content"
    resources:
      - path: EasyQSO/Preview Content
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shadowmov.EasyQSO
        INFOPLIST_FILE: EasyQSO/Info.plist
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        DEVELOPMENT_ASSET_PATHS: "\"EasyQSO/Preview Content\""
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "1"
    preBuildScripts:
      - script: |
          OUTPUT_FILE="${SRCROOT}/EasyQSO/GitVersion.swift"
          TMP_FILE="${OUTPUT_FILE}.tmp"
          COMMIT_HASH="unknown"
          IS_DIRTY="false"
          if git -C "$SRCROOT" rev-parse --git-dir > /dev/null 2>&1; then
            COMMIT_HASH=$(git -C "$SRCROOT" rev-parse --short HEAD 2>/dev/null || echo "unknown")
            if ! git -C "$SRCROOT" diff --quiet HEAD -- ':!EasyQSO/GitVersion.swift' 2>/dev/null; then
              IS_DIRTY="true"
            fi
          fi
          cat > "$TMP_FILE" << GITEOF
          // Auto-generated by pre-build script. Do not edit manually.
          enum GitVersion {
              static let commitHash = "${COMMIT_HASH}"
              static let isDirty = ${IS_DIRTY}
              static var isAvailable: Bool {
                  commitHash != "unknown" && !commitHash.isEmpty
              }
              static var displayVersion: String {
                  guard isAvailable else { return "unknown" }
                  return isDirty ? "\(commitHash)-dirty" : commitHash
              }
          }
          GITEOF
          if [ $? -eq 0 ]; then
            mv "$TMP_FILE" "$OUTPUT_FILE"
          else
            rm -f "$TMP_FILE"
            if [ ! -f "$OUTPUT_FILE" ]; then
              cat > "$OUTPUT_FILE" << 'FALLBACK'
          // Auto-generated fallback (git info unavailable).
          enum GitVersion {
              static let commitHash = "unknown"
              static let isDirty = false
              static var isAvailable: Bool { false }
              static var displayVersion: String { "unknown" }
          }
          FALLBACK
            fi
          fi
        name: Generate Git Version Info
        outputFiles:
          - $(SRCROOT)/EasyQSO/GitVersion.swift
    scheme:
      testTargets:
        - EasyQSOTests
      gatherCoverageData: true

  EasyQSOTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EasyQSOTests
    dependencies:
      - target: EasyQSO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shadowmov.EasyQSOTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  EasyQSO:
    build:
      targets:
        EasyQSO: all
        EasyQSOTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - EasyQSOTests
    profile:
      config: Release
    archive:
      config: Release
