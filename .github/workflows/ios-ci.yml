name: iOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (iOS latest)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Configure project for CI
        run: |
          sed -i '' '/DEVELOPMENT_TEAM:/d' project.yml
          sed -i '' '/CODE_SIGN_STYLE:/d' project.yml
          sed -i '' '/CODE_SIGN_IDENTITY:/d' project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Determine Simulator
        run: |
          SIMULATOR=$(xcrun simctl list devices available \
            | grep -oE 'iPhone [0-9]+' \
            | sort -t ' ' -k2 -n \
            | tail -1)
          if [ -z "$SIMULATOR" ]; then
            echo "::error::No available iPhone simulator found"
            exit 1
          fi
          echo "Using simulator: $SIMULATOR"
          echo "SIMULATOR=$SIMULATOR" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme EasyQSO \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=latest" \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
